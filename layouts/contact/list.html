{{ define "main" }}
  <section class="mius-page-hero">
    <div class="container">
      <p class="mius-eyebrow">Contact</p>
      <h1>{{ .Title | markdownify }}</h1>
      {{ with .Params.description }}
        <p class="mius-page-hero__copy">{{ . | markdownify }}</p>
      {{ end }}
    </div>
  </section>

  <section class="mius-section mius-contact">
    <div class="container">
      <div class="mius-contact-card">
        <h2>Committee Contact</h2>
        <p>
          To contact a committee representative, please send an email to
          <a href="mailto:{{ .Params.email }}">{{ .Params.email }}</a>.
        </p>
      </div>
    </div>
  </section>
{{ end }}
