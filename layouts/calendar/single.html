{{ define "main" }}
  <section class="mius-page-hero">
    <div class="container">
      <p class="mius-eyebrow">Calendar</p>
      <h1>{{ .Title | markdownify }}</h1>
      {{ with .Params.description }}
        <p class="mius-page-hero__copy">{{ . | markdownify }}</p>
      {{ end }}
      {{ if .Content }}
        <div class="mius-page-hero__small">{{ .Content }}</div>
      {{ end }}
    </div>
  </section>

  <section class="mius-section mius-events-calendar">
    <div class="container">
      {{ partial "event-calendar.html" . }}
    </div>
  </section>
{{ end }}
